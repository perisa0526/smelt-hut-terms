<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>빙어 낚시 — 이용약관 및 개인정보 처리방침</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      max-width: 760px; margin: 0 auto; padding: 24px 18px 64px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      line-height: 1.75; color: #1f2937; background: #fff;
      -webkit-text-size-adjust: 100%;
    }
    h1 { font-size: 1.5rem; border-bottom: 3px solid #2dd4bf; padding-bottom: 10px; margin-top: 2.2rem; }
    h2 { font-size: 1.15rem; margin-top: 1.8rem; color: #0f766e; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.92rem; }
    th, td { border: 1px solid #e5e7eb; padding: 8px 10px; text-align: left; vertical-align: top; }
    th { background: #f0fdfa; }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 2.5rem 0; }
    ul, ol { padding-left: 1.3rem; }
    code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; font-size: 0.9em; }
    a { color: #0d9488; }
    #c em { color: #6b7280; font-style: normal; font-size: 0.9rem; }
    @media (prefers-color-scheme: dark) {
      body { color: #e5e7eb; background: #111827; }
      th { background: #134e4a; }
      th, td { border-color: #374151; }
      code { background: #1f2937; }
    }
  </style>
</head>
<body>
  <div id="c">약관을 불러오는 중입니다…</div>
  <noscript>
    <p>약관 전문은 <a href="README.md">여기(README.md)</a>에서 확인하실 수 있습니다.</p>
  </noscript>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('README.md')
      .then(function (r) { return r.text(); })
      .then(function (t) { document.getElementById('c').innerHTML = marked.parse(t); })
      .catch(function () {
        document.getElementById('c').innerHTML =
          '<p>약관을 불러오지 못했습니다. <a href="README.md">README.md</a>에서 직접 확인해 주세요.</p>';
      });
  </script>
</body>
</html>
